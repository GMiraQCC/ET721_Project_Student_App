{% extends 'base.html' %}

{% block sitetitle %}User Log-In{% endblock %}

{% block content %}
    <h1>User Log-In</h1>
    <form method="post" class="login_form">
        <section>
            <input type="email" name="email" placeholder="Type email..." required>
        </section>
        
        <section>
            <input type="password" name="password" placeholder="Type password..." required>
        </section>

        <button type="submit">Log in</button>
    </form>

    <div class="signup_div">
        <p>Don't have an account? <a href="{{url_for('signup')}}">Sign-Up</a></p>
    </div>

    <!-- flash msg -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p class="flash_msg">{{msg}}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
{% endblock %}
